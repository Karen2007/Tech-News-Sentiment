name: Sentiment Analysis Automation

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # This step caches the actual FinBERT model files
      - name: Cache Transformers Models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-transformers-${{ hashFiles('analysis.py') }}
          restore-keys: |
            ${{ runner.os }}-transformers-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        run: python scrape.py

      - name: Run Analysis
        run: python analysis.py

      - name: Save Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated Pulse Update: $(date)" || echo "No changes to commit"
          git push